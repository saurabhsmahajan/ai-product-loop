# config/agent_manifest.yaml
# Purpose: Per-agent governance record — accountability, scope boundaries,
#           EU AI Act risk tier, oversight requirements
# Framework: NIST GOVERN 2 | ISO/IEC 42001 Clause 6 | AIGP BOK v2.1 Domain 1
# Owner: Saurabh Mahajan (saurabh@arcaence.com)
# Last reviewed: 2026-06-12
# Review cadence: Quarterly or after any agent architecture change

version: "1.0"
owner: "Saurabh Mahajan"
repository: "github.com/saurabhsmahajan/ai-product-loop"

agents:

  # ── STAGE 01: DISCOVER ────────────────────────────────────────────────────

  - agent_id: synthesis_agent
    display_name: "Synthesis Agent — Pain Theme Extraction"
    file: "agents/synthesis_agent.py"
    stage: discover
    stage_number: 1
    eu_ai_act_risk_tier: minimal_risk
    permitted_inputs:
      - interview_transcripts
      - chromadb_vectors
    permitted_outputs:
      - opportunity_map
      - pain_themes
      - frequency_scores
      - severity_scores
    human_oversight_required: false
    oversight_trigger: null
    model_routing:
      default: "gpt-4o-mini"
      upgrade_to: null
      upgrade_trigger: null
    data_retention_days: 90
    bias_considerations: >
      May over-index on pain themes from verbose or technically articulate
      respondents. Frequency count alone does not capture severity. Review
      theme distribution against respondent count separately before acting
      on opportunity map outputs.
    known_limitations:
      - "Requires minimum 3 interview transcripts for meaningful synthesis"
      - "Competitive intel uses LLM training knowledge, not live web search"
    last_reviewed: "2026-06-12"

  # ── STAGE 02: EVALUATE ────────────────────────────────────────────────────

  - agent_id: persona_agent
    display_name: "Persona Simulation Agent"
    file: "agents/persona_agent.py"
    stage: evaluate
    stage_number: 2
    eu_ai_act_risk_tier: limited_risk
    permitted_inputs:
      - feature_hypothesis
    permitted_outputs:
      - persona_reactions
      - avg_reaction_score
      - persona_simulation_report
    human_oversight_required: false
    oversight_trigger: "avg_reaction_score < 3.0"
    model_routing:
      default: "gpt-4o-mini"
      upgrade_to: null
      upgrade_trigger: null
    data_retention_days: 30
    bias_considerations: >
      Synthetic personas are generated by the same LLM that processes the
      feature hypothesis. They may systematically reflect LLM training data
      biases rather than real user diversity. Minority user segments, users
      with accessibility needs, and non-English speaking users are likely
      underrepresented. Validate persona reactions against real user research
      before treating as representative signal.
    known_limitations:
      - "Personas are synthetic — not real user data"
      - "May not represent minority or underserved user segments"
    last_reviewed: "2026-06-12"

  - agent_id: hallucination_eval_agent
    display_name: "Hallucination Eval Agent — Faithfulness and Factuality"
    file: "agents/eval_agent.py"
    stage: evaluate
    stage_number: 2
    eu_ai_act_risk_tier: limited_risk
    permitted_inputs:
      - synthesis_output
      - feature_hypothesis
      - interview_transcripts
    permitted_outputs:
      - faithfulness_score
      - factuality_score
      - hallucination_flags
      - hallucination_eval_report
    human_oversight_required: false
    oversight_trigger: "faithfulness_score < 0.70"
    model_routing:
      default: "gpt-4o-mini"
      upgrade_to: null
      upgrade_trigger: null
    data_retention_days: 30
    bias_considerations: >
      Self-referential evaluation risk: the eval model shares the same
      model family as the generation model. This creates a risk that the
      judge is systematically lenient toward outputs from the same family.
      Flag any faithfulness score above 0.95 for manual review — perfect
      scores are a signal of eval failure, not perfect generation.
    known_limitations:
      - "Faithfulness and factuality are two different failure modes — scored separately"
      - "Self-referential eval risk documented — see bias_considerations"
    last_reviewed: "2026-06-12"

  - agent_id: confidence_calibration_agent
    display_name: "Confidence Calibration Agent — Brier Score"
    file: "agents/confidence.py"
    stage: evaluate
    stage_number: 2
    eu_ai_act_risk_tier: limited_risk
    permitted_inputs:
      - ai_outputs_with_stated_confidence
      - actual_outcomes
      - hallucination_eval_report
    permitted_outputs:
      - brier_score
      - trust_score
      - calibration_gap
      - confidence_report
    human_oversight_required: false
    oversight_trigger: "trust_score < 4.0"
    model_routing:
      default: "gpt-4o-mini"
      upgrade_to: null
      upgrade_trigger: null
    data_retention_days: 30
    bias_considerations: >
      Brier score requires resolved outcomes to be meaningful. Scores
      calculated on fewer than 5 resolved outcomes are indicative only
      and should not be used to adjust confidence thresholds.
    known_limitations:
      - "Requires minimum 5 resolved outcomes for statistically meaningful Brier score"
      - "Scores below this threshold are indicative only — do not adjust thresholds"
    last_reviewed: "2026-06-12"

  - agent_id: governance_agent
    display_name: "Responsible AI Governance Module"
    file: "agents/governance.py"
    stage: evaluate
    stage_number: 2
    eu_ai_act_risk_tier: limited_risk
    permitted_inputs:
      - feature_description
      - decision
    permitted_outputs:
      - eu_ai_act_tier
      - bias_flags
      - pii_detected
      - pii_details
      - governance_verdict
      - governance_report
    human_oversight_required: true
    oversight_trigger: "eu_ai_act_tier = high_risk OR bias_flags_raised = true OR pii_detected = true"
    model_routing:
      default: "gpt-4o-mini"
      upgrade_to: null
      upgrade_trigger: null
    data_retention_days: 90
    bias_considerations: >
      This agent IS the bias detection control. Any flags it raises must
      be reviewed by a human before a GO decision proceeds. The agent
      itself may have systematic blind spots for bias patterns that are
      underrepresented in its training data.
    known_limitations:
      - "PII patterns are regex-based — may miss novel PII formats"
      - "EU AI Act classification is LLM-generated — verify for edge cases"
    last_reviewed: "2026-06-12"

  # ── STAGE 03: DECIDE ──────────────────────────────────────────────────────

  - agent_id: orchestrator_agent
    display_name: "Orchestrator Agent — Signal Aggregation"
    file: "agents/orchestrator.py"
    stage: decide
    stage_number: 3
    eu_ai_act_risk_tier: limited_risk
    permitted_inputs:
      - hallucination_eval_report
      - confidence_report
      - persona_simulation_report
      - governance_report
      - rag_context
      - competitive_intelligence
    permitted_outputs:
      - aggregated_confidence
      - weighted_signals
      - context_package
      - orchestrator_report
    human_oversight_required: false
    oversight_trigger: "aggregated_confidence < 0.75"
    model_routing:
      default: "gpt-4o-mini"
      upgrade_to: "gpt-4o"
      upgrade_trigger: "aggregated_confidence < 0.75"
    confidence_weighting:
      hallucination_eval: 0.30
      confidence_calibration: 0.30
      persona_simulation: 0.20
      governance_verdict: 0.20
      rationale: >
        Hallucination weighted highest (30%) because it is the one failure
        mode that is invisible until it reaches the user. Calibration
        weighted equally (30%) because miscalibrated confidence is the
        root cause of GO decisions on weak evidence. Persona (20%) and
        governance (20%) are important signals but more recoverable if wrong.
    data_retention_days: 30
    bias_considerations: >
      The confidence weighting scheme encodes value judgements about which
      signal types matter most. These weights were set by the system designer
      and should be reviewed quarterly against outcome data to verify they
      produce well-calibrated aggregated scores.
    known_limitations:
      - "Competitive intel uses LLM knowledge, not live web search"
      - "RAG context quality depends on ChromaDB freshness"
    last_reviewed: "2026-06-12"

  - agent_id: decider_agent
    display_name: "Decider Agent — GO / NO_GO / CONDITIONAL_GO"
    file: "agents/decider.py"
    stage: decide
    stage_number: 3
    eu_ai_act_risk_tier: limited_risk
    permitted_inputs:
      - orchestrator_report
      - feature_hypothesis
    permitted_outputs:
      - decision
      - confidence_score
      - reasoning_chain
      - escalate_to_human
      - decider_report
      - _grc_disclosure
    human_oversight_required: true
    oversight_trigger: "ALWAYS — all outputs require human review before any feature ships"
    model_routing:
      default: "gpt-4o-mini"
      upgrade_to: "gpt-4o"
      upgrade_trigger: "orchestrator aggregated_confidence < 0.75"
    data_retention_days: 90
    bias_considerations: >
      LLM reasoning chains may reflect training data bias toward
      particular feature types, industries, or user archetypes. Audit
      reasoning chains quarterly for systematic patterns — for example,
      if GO rate is significantly higher for certain feature categories
      than the outcome data justifies.
    known_limitations:
      - "Decision quality depends on quality of orchestrator context package"
      - "Reasoning chain is LLM-generated — not a formal logical proof"
    last_reviewed: "2026-06-12"

  - agent_id: reflexion_agent
    display_name: "Reflexion Loop — Critic Agent"
    file: "agents/critic.py"
    stage: decide
    stage_number: 3
    eu_ai_act_risk_tier: limited_risk
    permitted_inputs:
      - decider_report
      - feature_hypothesis
      - orchestrator_report
    permitted_outputs:
      - critique_score
      - revision_required
      - final_decision
      - reflexion_report
    human_oversight_required: true
    oversight_trigger: "critique_score < 0.70 after 2 passes — auto-escalates to human via Slack"
    model_routing:
      default: "gpt-4o-mini"
      upgrade_to: "gpt-4o"
      upgrade_trigger: "orchestrator aggregated_confidence < 0.75"
    reflexion_limits:
      max_passes: 2
      rationale: >
        One pass is insufficient to catch genuine reasoning gaps. Three
        passes adds latency and cost with diminishing returns. Two passes
        catches the majority of weak reasoning while keeping the pipeline
        fast enough to run daily. After 2 failed passes, escalation to
        human is mandatory.
    data_retention_days: 30
    bias_considerations: >
      Critic and Decider use the same model family. Self-referential
      critique risk — the critic may be systematically lenient toward
      reasoning patterns common in its training data. The 2-pass hard
      limit prevents circular reasoning loops that self-reinforce.
    known_limitations:
      - "Critic and Decider share model family — self-referential critique risk"
      - "Hard limit of 2 passes — escalates rather than loops indefinitely"
    last_reviewed: "2026-06-12"

  - agent_id: security_agent
    display_name: "Agent Security Layer"
    file: "agents/security_layer.py"
    stage: decide
    stage_number: 3
    eu_ai_act_risk_tier: minimal_risk
    permitted_inputs:
      - all_pipeline_inputs
      - all_agent_outputs
    permitted_outputs:
      - sanitised_input
      - validation_result
      - security_log_entry
      - blocked_flag
      - threat_types
    human_oversight_required: false
    oversight_trigger: "injection_detected = true OR unsafe_output_pattern = true"
    model_routing:
      default: null
      note: "No LLM call — regex-based pattern matching only"
    data_retention_days: 90
    bias_considerations: >
      Regex-based injection detection has false positive risk on legitimate
      technical language (e.g. feature descriptions containing words like
      'system', 'instructions', 'override' in a non-malicious context).
      Review blocked inputs weekly to tune patterns and reduce false positives.
    known_limitations:
      - "Regex patterns, not LLM classifier — lower detection accuracy on novel injection techniques"
      - "False positive risk on technical product language — review weekly"
    last_reviewed: "2026-06-12"

  # ── STAGE 04: LEARN ───────────────────────────────────────────────────────

  - agent_id: calibration_agent
    display_name: "Calibration Analysis Agent"
    file: "agents/calibration_agent.py"
    stage: learn
    stage_number: 4
    eu_ai_act_risk_tier: minimal_risk
    permitted_inputs:
      - audit_trail
    permitted_outputs:
      - brier_score_trend
      - threshold_recommendations
      - calibration_report
    human_oversight_required: false
    oversight_trigger: "brier_score_trend = worsening across 5 consecutive runs"
    model_routing:
      default: "gpt-4o-mini"
      upgrade_to: null
      upgrade_trigger: null
    data_retention_days: 90
    bias_considerations: >
      Recommendations are only statistically meaningful after 5 resolved
      outcomes. Before this threshold, treat all recommendations as
      directional only. Do not adjust confidence thresholds based on
      fewer than 5 data points.
    known_limitations:
      - "Minimum 5 resolved outcomes required for meaningful recommendations"
      - "Recommendations before this threshold are directional only"
    last_reviewed: "2026-06-12"

  - agent_id: business_impact_agent
    display_name: "Business Impact Translator"
    file: "agents/business_impact.py"
    stage: learn
    stage_number: 4
    eu_ai_act_risk_tier: limited_risk
    permitted_inputs:
      - decision
      - confidence_score
      - feature_hypothesis
      - persona_simulation_report
    permitted_outputs:
      - revenue_estimate
      - executive_memo
      - slack_post
    human_oversight_required: true
    oversight_trigger: "ALWAYS — revenue estimates must be reviewed by a human before any external communication"
    model_routing:
      default: "gpt-4o-mini"
      upgrade_to: null
      upgrade_trigger: null
    data_retention_days: 90
    bias_considerations: >
      Revenue estimates are LLM-generated approximations based on
      feature hypothesis framing and persona reactions. They are
      directional only. Never use as the sole basis for financial
      planning, budget allocation, or external reporting.
    known_limitations:
      - "Revenue estimates are illustrative — not financial projections"
      - "Must not be shared externally without human review and disclaimer"
    last_reviewed: "2026-06-12"